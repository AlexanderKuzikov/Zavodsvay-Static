<h1>Карта выполненных работ</h1>

<style>
    #map-works {
        width: 100%;
        height: 500px;
        background-color: #f0f0f0;
        position: relative;
    }
    .map-loader {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
    }
    .custom-marker {
        background-color: #ff5722;
        border: 2px solid #fff;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        cursor: pointer;
        box-shadow: 0 0 5px rgba(0,0,0,0.5);
        transition: transform 0.2s;
    }
    .custom-marker:hover {
        transform: scale(1.2);
        background-color: #e64a19;
    }
</style>

<script src="https://api-maps.yandex.ru/v3/?apikey=c0204985-1515-44c3-8e4e-1a57f540fd94&lang=ru_RU"></script>

<div id="map-works">
    <div class="map-loader">Загрузка карты...</div>
</div>

<script>
    async function initMap() {
        try {
            await ymaps3.ready;

            const { YMap, YMapDefaultSchemeLayer, YMapDefaultFeaturesLayer, YMapMarker } = ymaps3;

            const map = new YMap(document.getElementById('map-works'), {
                location: { center: [55.9, 58.1], zoom: 9 }
            });

            map.addChild(new YMapDefaultSchemeLayer());
            map.addChild(new YMapDefaultFeaturesLayer());

            let objects = [];
            try {
                const res = await fetch('data.json');
                if (!res.ok) throw new Error(res.status);
                objects = await res.json();
            } catch (e) {
                console.error('Ошибка загрузки data.json:', e);
            }

            objects.forEach(obj => {
                const el = document.createElement('div');
                el.className = 'custom-marker';
                el.title = obj.title || '';
                el.onclick = () => { if (obj.url) window.open(obj.url, '_blank'); };

                map.addChild(new YMapMarker(
                    { coordinates: obj.coords, draggable: false },
                    el
                ));
            });
        } finally {
            const loader = document.querySelector('.map-loader');
            if (loader) loader.style.display = 'none';
        }
    }

    initMap().catch(console.error);
</script>
